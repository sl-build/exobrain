name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group dev
      - name: Ruff lint
        run: .venv/bin/ruff check src/
      - name: Ruff format
        run: .venv/bin/ruff format --check src/
      - name: Pyright
        run: .venv/bin/pyright src/
      - name: Tests
        run: .venv/bin/pytest tests/ -x -q
